name: Deploy HR-API-STATICWEBAPP

on:
  push:
    branches:
      - main
      - New-HR-frontend
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - New-HR-frontend
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hr-frontend/hr-frontend/package-lock.json

      - name: Install and build frontend
        working-directory: hr-frontend/hr-frontend
        run: npm ci && npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_AZURE_API_SCOPE: ${{ secrets.VITE_AZURE_API_SCOPE }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Verify deployment token is set
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::GitHub secret AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_GRASS_046E94503 is empty."
            exit 1
          fi
          echo "Deployment token secret is configured."
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_GRASS_046E94503 }}

      - name: Deploy to Azure Static Web Apps (CLI)
        run: |
          npx @azure/static-web-apps-cli@latest deploy hr-frontend/hr-frontend/dist --env production --verbose silly 2>&1 | tee deploy.log
          if grep -qE "Project deployed to|Visit your site at|deployment has completed" deploy.log; then
            echo "Deploy succeeded"
          else
            echo "::error::SWA deploy failed — see deploy.log"
            cat deploy.log
            exit 1
          fi
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_GRASS_046E94503 }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_GRASS_046E94503 }}
          action: close
